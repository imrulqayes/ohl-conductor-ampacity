; ============================================================
;  Conductor Ampacity Calculator — Configuration File
;  IEEE 738 / CIGRE Overhead Conductor Thermal Rating
; ============================================================
;
;  HOW TO USE THIS FILE:
;    1. Set the conductor name (or fill in manual data below).
;    2. Adjust environmental and solar conditions to match your site.
;    3. Choose which calculations to run and set their parameters.
;    4. Run:  python conductor_ampacity.py
;       Or double-click: run_ampacity.bat
;
;  INLINE COMMENTS: Use ; for comments after a value.
; ============================================================


; ──────────────────────────────────────────────────────────────
;  GENERAL — Calculation standard
; ──────────────────────────────────────────────────────────────
[general]
; Calculation standard. Options: ieee738 | cigre (cigre not yet implemented)
standard = ieee738


; ──────────────────────────────────────────────────────────────
;  CONDUCTOR — Identify the conductor
; ──────────────────────────────────────────────────────────────
[conductor]
; OPTION A — Conductor name (looked up from data/conductor database Excel file)
;   - Case-insensitive, but spelling must match the database exactly.
;   - Leave blank to use Option B (manual values below).
;   - You can also pass the name directly: python conductor_ampacity.py grosbeak
name = Grosbeak

; OPTION B — Manual conductor data (only used if 'name' above is left empty)
;   Uncomment and fill these if your conductor is not in the database.
; diameter_mm              = 25.16   ; Outside diameter in mm
; temp_low_C               = 25      ; Reference temperature for low resistance (°C)
; temp_high_C              = 75      ; Reference temperature for high resistance (°C)
; resistance_low_ohm_per_km  = 90.22   ; AC resistance at low reference temp (Ohm/km)
; resistance_high_ohm_per_km = 107.60  ; AC resistance at high reference temp (Ohm/km)
; heat_capacity_J_per_mK   = 1047    ; Conductor heat capacity in J/(m·°C)  [required for transient]
; max_allowable_temp_C      = 75     ; Maximum allowable conductor temperature for rating calculation
;                                    ; If set here, overrides max_conductor_temp_C below.
;                                    ; If the conductor is from the database, the database value is used.


; ──────────────────────────────────────────────────────────────
;  ENVIRONMENT — Site and weather conditions
; ──────────────────────────────────────────────────────────────
[environment]
; Elevation of the conductor above sea level (meters)
elevation_m      = 100

; Ambient air temperature at the conductor site (°C)
ambient_temp_C   = 45

; Wind speed at conductor level (m/s)
;   0.61 m/s is the IEEE 738 conservative default (worst-case low wind)
wind_speed_m_s   = 0.61

; Angle between wind direction and conductor axis (degrees)
;   90 = wind perpendicular to the conductor (worst case for cooling)
;    0 = wind parallel to the conductor
wind_angle_deg   = 90

; Atmosphere type: clear | industrial
;   'clear'      = typical rural / suburban environment
;   'industrial' = polluted / industrial environment (higher solar absorption)
atmosphere       = clear


; ──────────────────────────────────────────────────────────────
;  SOLAR — Geographic and time conditions for solar heat gain
; ──────────────────────────────────────────────────────────────
[solar]
; Geographic latitude of the conductor (degrees)
;   Positive = Northern Hemisphere, Negative = Southern Hemisphere
;   Examples: Dhaka = 23.68, London = 51.5, Sydney = -33.87
latitude_deg     = 23.68

; Date of the rating calculation (dd/mm/yyyy format)
;   Use the summer solstice or hottest expected day for conservative ratings.
date             = 23/07/2025

; Hour of day in 24-hour format (integer or decimal)
;   Solar noon (hour = 12) gives maximum solar heat gain.
;   Examples: 11 = 11 AM,  14 = 2 PM,  17.5 = 5:30 PM
hour             = 12

; Azimuth of the transmission line (degrees, clockwise from true North)
;   0  = line runs North-South
;   90 = line runs East-West
;   45 = line runs NE-SW
line_azimuth_deg = 45


; ──────────────────────────────────────────────────────────────
;  CONDUCTOR SURFACE PROPERTIES
; ──────────────────────────────────────────────────────────────
[conductor_properties]
; Emissivity — how effectively the conductor radiates heat (0 to 1)
;   New/shiny conductor : ~0.2–0.4
;   Aged/weathered      : ~0.7–0.9   (IEEE 738 typical default: 0.7)
emissivity       = 0.6

; Solar absorptivity — fraction of solar radiation absorbed (0.23 to 0.91)
;   New/shiny conductor : ~0.2–0.4
;   Aged/weathered      : ~0.8–0.9   (IEEE 738 typical default: 0.9 for aged)
absorptivity     = 0.6


; ──────────────────────────────────────────────────────────────
;  CALCULATIONS — Select which calculations to run and set inputs
; ──────────────────────────────────────────────────────────────
[calculations]
; Enable or disable each calculation (true / false)
;   By default all three are enabled.
run_thermal_rating    = true   ; Max current for a given temperature limit
run_steady_temperature = true  ; Conductor temperature for a given current
run_transient         = true   ; Temperature profile during a fault/overload event

; ── Steady-State Temperature ────────────────────────────────
; Current flowing through the conductor (A)
; this is the temperature after below current flows through the conductor for long enough to settle
steady_current_A      = 900

; ── Transient (Fault / Overload) ────────────────────────────
; Pre-transient steady-state current (A) — conductor loading before the event
;   Set to 'auto' to automatically use 50% of the conductor's steady-state
;   thermal rating (calculated using the max allowable temperature).
transient_pre_current_A  = auto

; Fault current levels as percentages of the steady-state thermal rating
;   Comma-separated list of percentages.
;   All levels are calculated automatically and shown as separate curves.
transient_fault_levels_pct = 110, 120, 130, 150, 200

; How long to calculate the transient response (minutes)
transient_duration_min   = 60

; Time step for the transient calculation (seconds)
;   Smaller values give finer resolution but take longer.
transient_interval_s     = 60


; ──────────────────────────────────────────────────────────────
;  OUTPUT — Where to save results
; ──────────────────────────────────────────────────────────────
[output]
; Folder (relative to project root) where Excel result files are saved
output_folder = output
